<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>⚡ 변전실 설비 매뉴얼 바로보기</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #525659; }
        .container { width: 100%; height: 100%; display: flex; flex-direction: column; }
        /* 상단 안내 바 */
        .top-bar { background: #222; color: #fff; padding: 12px; text-align: center; font-weight: bold; font-size: 14px; }
        /* 초고화질 원본 PDF 출력 창 */
        .pdf-viewer { width: 100%; flex: 1; border: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="top-bar">⚡ 메인 VCB반 설비 매뉴얼 (손가락 확대 가능)</div>
        
        <object class="pdf-viewer" data="https://ltower2118.github.io/resource/01.pdf" type="application/pdf">
            <embed src="https://ltower2118.github.io/resource/01.pdf" type="application/pdf" />
        </object>
    </div>

</body>
</html>
